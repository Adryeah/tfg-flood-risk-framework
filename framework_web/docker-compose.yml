version: "3.9"

services:
  backend:
    image: python:3.12-slim
    container_name: flood-risk-backend
    working_dir: /app/framework_web
    environment:
      DEBUG: "${DEBUG:-true}"
      API_PORT: "${API_PORT:-8000}"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../models:/app/models:ro
      - ../data:/app/data:ro
      - ../results:/app/results:ro
      - ./backend:/app/framework_web/backend
      - ./tools:/app/framework_web/tools:ro
    command: >
      bash -c "
        pip install --no-cache-dir -r backend/requirements.txt &&
        uvicorn backend.main:app --host 0.0.0.0 --port 8000
      "
    restart: unless-stopped
